# DV Cascade Comparison: top-k vs LTT threshold delegation strategies
#
# Compares batched top-k (probe uncertainty, DV probe, oracle) against
# LTT-calibrated DV threshold with Pareto-filtered budget guarantees.
#
# Usage:
#   uv run experiments/dv_cascade_comparison.py --config configs/dv_cascade_comparison.yaml

# --- Batch sizes to compare ---
batch_sizes: [32, 64, 128]
# Number of k steps to sweep (0 to batch_size)
n_k_steps: 20

# --- LTT calibration ---
# Fraction of test data used for LTT calibration (rest is evaluation)
calib_fraction: 0.5
# PAC guarantee probability (1 - delta)
guarantee_probability: 0.9
# DV threshold grid fineness
tau_steps: 200
# Number of alpha_budget levels to sweep
n_alpha_steps: 20
# Pareto testing: filter thresholds that hurt downstream performance
pareto_testing: true
# Fraction of calibration data used for Pareto optimisation (rest for hypothesis testing)
pareto_split_proportion: 0.3
# Risk to optimise (accuracy_error or roc_auc_error)
opt_risk: accuracy_error

# --- Model settings (same as dv_ltt_cascade) ---
activations_model_name: meta-llama/Llama-3.2-1B-Instruct
activations_layer: 11
baseline_model_name: google/gemma-3-27b-it
reduction_strategy: mean

# When true, dispatch baseline LLM inference to Modal cloud GPUs on cache miss
use_modal: true

seed: 42

# --- Training data ---
train_dataset_path: ${DATA_DIR}/training/prompts_4x/train.jsonl

# --- Fallback paths (used when mixed_datasets is absent) ---
dev_dataset_path: ${DATA_DIR}/evals/dev/anthropic_balanced_apr_23.jsonl
test_dataset_path: ${DATA_DIR}/evals/test/anthropic_test_balanced_apr_23.jsonl

# --- Mixed dataset configuration ---
mixed_datasets:
  balance_strategy: 500
  sources:
    - group: anthropic
      dev: ${DATA_DIR}/evals/dev/anthropic_balanced_apr_23.jsonl
      test: ${DATA_DIR}/evals/test/anthropic_test_balanced_apr_23.jsonl
    - group: mt
      dev: ${DATA_DIR}/evals/dev/mt_balanced_apr_30.jsonl
      test: ${DATA_DIR}/evals/test/mt_test_balanced_apr_30.jsonl
    - group: mts
      dev: ${DATA_DIR}/evals/dev/mts_balanced_apr_22.jsonl
      test: ${DATA_DIR}/evals/test/mts_test_balanced_apr_22.jsonl
    - group: toolace
      dev: ${DATA_DIR}/evals/dev/toolace_balanced_apr_22.jsonl
      test: ${DATA_DIR}/evals/test/toolace_test_balanced_apr_22.jsonl
