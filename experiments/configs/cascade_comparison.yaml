# Cascade Comparison Experiment Configuration

# The budget to guarantee control over
budget: 0.5

# The probability with which the budget is guaranteed (1-FWER)
guarantee_probability: 0.9

# The strategy to reduce the sequence of activations to a fixed size vector
reduction_strategy: mean

# Batch size for cascade comparison
cascade_batch_size: 128

# Batch size for baseline model inference
# this cannot be less than 2, and should be even to avoid losing data
baseline_batch_size: 8

# The strategy to merge probe and baseline scores in the cascade
# cascade_merge_strategy: avg
cascade_merge_strategy: replace

# The name of the LLM model to use for computing activations
activations_model_name: meta-llama/Llama-3.2-1B-Instruct

# The layer of the LLM model to use for computing activations
activations_layer: 11

# The name of the LLM model to use as the baseline in the cascade
# baseline_model_name: meta-llama/Llama-3.2-1B-Instruct
# baseline_model_name: meta-llama/Llama-3.2-3B-Instruct
baseline_model_name: meta-llama/Llama-3.1-8B-Instruct

# Path to the training dataset for fitting the probe
train_dataset_path: ${DATA_DIR}/training/prompts_4x/train.jsonl

# Path to the calibration dataset (used to learn reliable threshold)
calib_dataset_path: ${DATA_DIR}/evals/dev/anthropic_balanced_apr_23.jsonl

# Path to the test dataset for comparing cascade strategies
test_dataset_path: ${DATA_DIR}/evals/test/anthropic_test_balanced_apr_23.jsonl

# Random seed for reproducibility
seed: 42

debug: False

pareto_testing: true
opt_risk: roc_auc_error
# opt_risk: accuracy_error

threshold_start: 0.7

threshold_end: 1.0

threshold_steps: 20

calibration_method: isotonic-regression
# calibration_method: platt-scaling 

# Optional: artificially degrade probe performance for delegation testing
probe_degradation_enabled: true