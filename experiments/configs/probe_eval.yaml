# Probe Evaluation Experiment Configuration

# Experiment budget
budget: 0.5

# Dataset paths
train_dataset_path: ${DATA_DIR}/training/prompts_4x/train.jsonl
dev_dataset_path: ${DATA_DIR}/evals/dev/anthropic_balanced_apr_23.jsonl
test_dataset_path: ${DATA_DIR}/evals/test/anthropic_test_balanced_apr_23.jsonl

# Probe configuration
# reduction_strategy: last
reduction_strategy: mean  

# Activation configuration
activations_model_name: meta-llama/Llama-3.2-1B-Instruct
activations_layer: 11

# Whether to automatically compute activations if they don't exist
auto_compute_activations: true

# Whether to delete activation files after loading to free disk space
cleanup_activations_after_load: false

# Random seed for reproducibility
seed: 42

# Debug mode - use smaller sample sizes
debug: false

# Optional: artificially degrade probe performance for delegation testing
probe_degradation_enabled: true

# Batch sizes
activation_batch_size: 32  # Batch size for computing activations
reduction_batch_size: 512  # Batch size for reduction operations

# calibration_method: isotonic-regression # Options: platt-scaling, isotonic-regression, or null
calibration_method: null

# Whether to use Modal cloud GPUs for baseline inference
use_modal: false

# Override GPU type for Modal (null = auto-select based on model)
modal_gpu: null
