repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: ruff format .
        language: system
        types: [python]

      - id: ruff-fix
        name: ruff check --fix
        entry: ruff check . --fix
        language: system
        types: [python]

      - id: ty
        name: uv run ty check 
        entry: uv run ty check
        language: system
        types: [python]
